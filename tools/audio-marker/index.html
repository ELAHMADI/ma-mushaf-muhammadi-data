<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Audio Marker — Kouchi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>Marker</strong>
      <span class="muted">· الكوشي</span>
    </div>
    <div class="topbar-actions">
      <select id="surahSelect" aria-label="السورة"></select>
      <button id="btnLoad" class="primary">تحميل</button>
    </div>
  </header>

  <main>
    <section class="player">
      <audio id="audio" preload="auto" controls playsinline></audio>
      <div class="player-row">
        <div class="time">
          <span id="curTime">00:00.000</span>
          <span class="muted">/</span>
          <span id="totTime">00:00.000</span>
        </div>
        <div class="rates" aria-label="السرعة">
          <button data-rate="0.5">0.5×</button>
          <button data-rate="0.75">0.75×</button>
          <button data-rate="1" class="active">1×</button>
          <button data-rate="1.25">1.25×</button>
        </div>
      </div>
      <div class="nudges" aria-label="ضبط دقيق">
        <button data-nudge="-1000">−1s</button>
        <button data-nudge="-100">−100ms</button>
        <button data-nudge="100">+100ms</button>
        <button data-nudge="1000">+1s</button>
      </div>
    </section>

    <section class="meta" id="metaPanel" hidden>
      <div><span class="muted">المؤشِّر</span> <strong id="metaCursor">—</strong></div>
      <div><span class="muted">الآيات</span> <strong id="metaVerseCount">0</strong></div>
      <div class="meta-url muted" id="metaUrl"></div>
    </section>

    <section class="verses">
      <div class="verses-head">
        <h2>الآيات</h2>
        <div class="legend muted">
          <span><span class="dot done"></span> مُعلَّمة</span>
          <span><span class="dot active"></span> الحالية</span>
        </div>
      </div>
      <ol id="versesList" class="verses-list"></ol>
    </section>

    <section class="export-bar" id="exportBar" hidden>
      <button id="btnCopy">📋 نسخ JSON</button>
      <button id="btnShare" hidden>📤 مشاركة</button>
      <button id="btnDownload">⬇ تنزيل</button>
      <button id="btnImport">📁 استيراد</button>
      <input id="fileImport" type="file" accept="application/json" hidden />
    </section>
  </main>

  <!-- Action bar fixed at bottom for thumb reach -->
  <div class="actionbar" id="actionBar" hidden>
    <button id="btnUndo" class="action-undo" aria-label="تراجع">↶</button>
    <button id="btnPlayPause" class="action-play" aria-label="تشغيل/إيقاف">▶</button>
    <button id="btnMark" class="action-mark primary">MARK</button>
  </div>

  <footer class="statusbar">
    <span id="status" class="muted">جاهز — اختر سورة.</span>
    <span id="autosave" class="muted"></span>
  </footer>

  <script src="marker.js"></script>
</body>
</html>
